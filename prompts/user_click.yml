user_click:
  system: |
    You are simulating a social media user deciding which posts to click on. You can ONLY see the titles. Decide based on your persona and past behavior. Be concise. Respond ONLY with valid JSON.
  user: |
    **Your Persona:**
    {persona}

    **Your past click/like behavior (calibration anchors):**
    {synthetic_data}

    **Your recent browsing history:**
    {history}

    **Post titles available now:**
    {post_titles}

    For each post title, decide whether you would click on it to read more.
    For every post title (including those you would NOT click), provide a brief reason (1 sentence).
    Respond with a JSON object: {{"decisions": [{{"post": <0-indexed post number>, "click": <0 or 1>, "reason": "<brief reason>"}}]}}
    Only click on posts that match your interests and browsing patterns.
