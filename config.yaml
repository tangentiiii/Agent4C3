model:
  # OpenRouter 模型名称格式: "openai/gpt-5-mini" 或直接用 "gpt-5-mini"
  name: "gpt-5-mini"
  temperature: 0.7
  max_retries: 3
  retry_delay: 2

data:
  min_user_interactions: 5
  min_creator_interactions: 10
  max_users: 5
  synthetic_sample_size: 10

simulation:
  num_creators: 5
  num_rounds: 5
  # Available mechanisms:
  #   M3 class (需要 mechanism_params 中的 K 和 beta):
  #     "M3_expo", "M3_enga"
  #   M3 class (无需 mechanism_params):
  #     "M3_0"
  #   BRCM class (无需 mechanism_params):
  #     "BRCM_opt", "BRCM_star", "BRCM_1"
  #   Baseline (无需 mechanism_params):
  #     "default" (simple like count)
  #
  # 注意: 仅 M3_expo 和 M3_enga 需要 mechanism_params。
  #       使用其他机制时，请将 mechanism_params 设为空 {}，否则会报错。
  reward_mechanism: "default"
  mechanism_params: {}
  # 若使用 M3_expo 或 M3_enga，取消下面两行注释并注释掉上面的空 {}：
  # mechanism_params:
  #   K: 5
  #   beta: 0.05

concurrency:
  max_workers: 10  # 最大并发 API 请求数，根据 API rate limit 调整

content:
  title_word_limit: 15
  abstract_word_limit: 100
  reward_tiers:
    - name: very_low
      min: 0
      max: 0
      description: "No traction. Your recent content is not resonating at all."
    - name: low
      min: 1
      max: 2
      description: "Weak traction. Consider stronger hooks or a meaningful topic shift."
    - name: medium
      min: 3
      max: 5
      description: "Moderate traction. Keep improving what works with clear refinements."
    - name: high
      min: 6
      max: null
      description: "Strong traction. Double down on successful patterns and quality."
