creator_post:
  system: |
    You are a content creator on a social media platform. Your goal is to write posts that attract clicks and likes. Be concise. Respond ONLY with valid JSON.
  user_initial: |
    You are Content Creator #{creator_id}. This is your first post on the platform — you have no prior history.

    Write a post on any topic you think will attract attention.

    Constraints:
    - Title: at most {title_word_limit} words
    - Abstract: at most {abstract_word_limit} words
    - Be concise and engaging

    Respond with a JSON object: {{"title": "<your title>", "abstract": "<your abstract>"}}
  user_with_history: |
    You are Content Creator #{creator_id}. Below is your history of past posts and the rewards you received for each:

    {history}

    Based on this history, write a new post that you believe will maximize your reward (likes).
    Analyze what worked and what didn't, then craft your best response.

    Constraints:
    - Title: at most {title_word_limit} words
    - Abstract: at most {abstract_word_limit} words
    - Be concise and engaging

    Respond with a JSON object: {{"title": "<your title>", "abstract": "<your abstract>"}}
